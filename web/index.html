<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUNAR LANDER</title>
  <!-- Link-sharing metadata (CONTRACT §8). -->
  <meta name="description" content="A classic 1979 arcade — rebuilt as a reinforcement-learning arena. Python physics in your browser via Pyodide; vector-monitor rendering in canvas.">
  <meta property="og:title" content="LUNAR LANDER">
  <meta property="og:description" content="A classic 1979 arcade — rebuilt as a reinforcement-learning arena. Fly it yourself or watch the autopilots collide.">
  <meta property="og:type" content="website">
  <!-- Inline SVG favicon: white lander outline on black (§8 — no image assets). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cg stroke='%23fff' fill='none' stroke-width='1.6'%3E%3Cpath d='M11 17v-5l3-3h4l3 3v5z'/%3E%3Cpath d='M9 17h14'/%3E%3Cpath d='M11 17l-4 7m18-7l4 7'/%3E%3Cpath d='M4 24h6m12 0h6'/%3E%3C/g%3E%3C/svg%3E">
  <style>
    /* 1979 vector-monitor look: pure black, thin glowing strokes, monospace
       everywhere. No gradients, no web fonts, no images (§8). */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: ui-monospace, Menlo, Consolas, "Courier New", monospace;
    }

    /* ------------------------------------------------- header / tagline */
    header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0 0.1rem;
      color: #fff;
      user-select: none;
    }
    /* Small lander glyph next to the title — inline SVG, white strokes with
       a soft glow filter so it matches the tube (§8). */
    header svg {
      width: 34px;
      height: 34px;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.7));
    }
    header h1 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: 0.38em;
      /* Glowing vector lettering: stacked white text-shadows, no color. */
      text-shadow: 0 0 2px #fff, 0 0 9px rgba(255, 255, 255, 0.75);
    }
    .tagline {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0.25rem 0 0.55rem;
      text-align: center;
      user-select: none;
    }

    /* --------------------------------------------------- canvas / stage */
    /* Logical canvas is 2000x750 = the world (CONTRACT §9); CSS scales it
       to fit the viewport width while preserving the 8:3 aspect ratio. The
       stage wrapper carries the size so the touch overlay can sit on top. */
    #stage {
      position: relative;
      width: min(100vw, calc((100vh - 10.5rem) * 8 / 3));
    }
    #screen {
      display: block;
      width: 100%;
      aspect-ratio: 8 / 3;
      height: auto;
      background: #000;
      touch-action: none; /* §8: no browser pan/zoom while flying */
    }

    /* ------------------------------------------------ touch hold-zones */
    /* §8: left third = rotate left, right third = rotate right,
       bottom-center = thrust. Faint vector-style dashed outlines so they
       are discoverable; visible only on coarse-pointer devices (app.js
       double-checks with matchMedia before wiring pointer events). */
    #touch { display: none; }
    @media (pointer: coarse) {
      #touch { display: block; position: absolute; inset: 0; }
    }
    #touch .zone {
      position: absolute;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      border: 1px dashed rgba(255, 255, 255, 0.22);
      color: rgba(255, 255, 255, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 4.5vmin, 42px);
    }
    #zone-left   { left: 0;   top: 0;    width: 33%; height: 100%; }
    #zone-right  { right: 0;  top: 0;    width: 33%; height: 100%; }
    #zone-thrust { left: 34%; right: 34%; bottom: 0; height: 38%;  }

    /* §8: portrait phones get a rotate hint above the (very short) canvas. */
    #rotate-hint { display: none; }
    @media (pointer: coarse) and (orientation: portrait) {
      #rotate-hint {
        display: block;
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.25em;
        padding: 0.4rem 0;
        text-shadow: 0 0 6px rgba(255, 255, 255, 0.7);
      }
    }

    /* ------------------------------------------------------------ footer */
    footer {
      color: #777;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.6rem 0;
      user-select: none;
    }
    footer a {
      color: #999;
      text-decoration: none;
      border-bottom: 1px dotted #666;
    }
  </style>
</head>
<body>
  <header>
    <!-- Lander glyph: same shape family as the canvas lander (§9). -->
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <g stroke="#fff" fill="none" stroke-width="1.6">
        <path d="M11 17v-5l3-3h4l3 3v5z"/>
        <path d="M9 17h14"/>
        <path d="M11 17l-4 7m18-7l4 7"/>
        <path d="M4 24h6m12 0h6"/>
      </g>
    </svg>
    <h1>LUNAR LANDER</h1>
  </header>
  <div class="tagline">A CLASSIC 1979 ARCADE &mdash; REBUILT AS A REINFORCEMENT-LEARNING ARENA</div>
  <div id="rotate-hint">ROTATE YOUR DEVICE</div>

  <div id="stage">
    <canvas id="screen" width="2000" height="750"></canvas>
    <!-- Touch hold-zones (§8): pointer events feed the same held-input set
         as the keyboard; wired in app.js only on coarse-pointer devices. -->
    <div id="touch" aria-hidden="true">
      <div class="zone" id="zone-left" data-code="ZoneLeft">&#9664;</div>
      <div class="zone" id="zone-thrust" data-code="ZoneThrust">&#9650;</div>
      <div class="zone" id="zone-right" data-code="ZoneRight">&#9654;</div>
    </div>
  </div>

  <footer>
    &larr;/A &rarr;/D rotate &nbsp;&middot;&nbsp; &uarr;/W/space thrust &nbsp;&middot;&nbsp; R new episode &nbsp;&middot;&nbsp; O agent view
    &nbsp;&middot;&nbsp; <a href="#">GITHUB</a><!-- TODO: replace # with the repository URL -->
  </footer>

  <!-- Pyodide runtime (CONTRACT §8) -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <!-- Plain scripts, no modules: effects (cosmetic layer, §10), then
       renderer (uses Effects for blink/camera data), then app. -->
  <script src="effects.js"></script>
  <script src="renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
