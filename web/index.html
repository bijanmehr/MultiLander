<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUNAR LANDER</title>
  <!-- Link-sharing metadata (CONTRACT §8). -->
  <meta name="description" content="A classic 1979 arcade — rebuilt as a reinforcement-learning arena. Python physics in your browser via Pyodide; vector-monitor rendering in canvas.">
  <meta property="og:title" content="LUNAR LANDER">
  <meta property="og:description" content="A classic 1979 arcade — rebuilt as a reinforcement-learning arena. Fly it yourself or watch the autopilots collide.">
  <meta property="og:type" content="website">
  <!-- Inline SVG favicon: white lander outline on black (§8 — no image assets). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cg stroke='%23fff' fill='none' stroke-width='1.6'%3E%3Cpath d='M11 17v-5l3-3h4l3 3v5z'/%3E%3Cpath d='M9 17h14'/%3E%3Cpath d='M11 17l-4 7m18-7l4 7'/%3E%3Cpath d='M4 24h6m12 0h6'/%3E%3C/g%3E%3C/svg%3E">
  <style>
    /* 1979 vector-monitor look: pure black, thin glowing strokes, monospace
       everywhere. No gradients, no web fonts, no images (§8). */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: ui-monospace, Menlo, Consolas, "Courier New", monospace;
    }

    /* ------------------------------------------------- header / tagline */
    header {
      padding: 0.7rem 0 0.35rem;
      user-select: none;
    }
    /* §8/§9: the display lettering is DRAWN — lander polylines + the stroke
       font on one canvas (painted once at load by the inline script below);
       no CSS-styled text. CSS only scales the 1600x170 logical canvas. */
    #header {
      display: block;
      width: min(92vw, 720px);
      height: auto;
      aspect-ratio: 1600 / 170;
    }

    /* --------------------------------------------------- canvas / stage */
    /* Logical canvas is 2000x750 = the world (CONTRACT §9); CSS scales it
       to fit the viewport width while preserving the 8:3 aspect ratio. */
    #stage {
      position: relative;
      width: min(100vw, calc((100vh - 10.5rem) * 8 / 3));
    }
    #screen {
      display: block;
      width: 100%;
      aspect-ratio: 8 / 3;
      height: auto;
      background: #000;
      touch-action: none; /* §8: no browser pan/zoom while flying */
    }

    /* --------------------------------------------- touch arcade buttons */
    /* §8: ←/→ rotate pair bottom-left, wide THRUST bottom-right, small OBS
       toggle top-right — what the 1979 cabinet had. Chamfered corners (cut
       10px at 45°) via clip-path polygons: the 1.5px outline is an evenodd
       polygon RING on ::after (clipping the button itself would cut the
       border open at every chamfer); ::before carries the pressed fill.
       Labels are small canvases painted ONCE with VectorFont in app.js —
       never CSS text (§8/§9). Visible only on coarse-pointer devices
       (app.js double-checks with matchMedia before wiring pointer events). */
    #touch { display: none; }
    @media (pointer: coarse) {
      #touch {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none; /* only the buttons themselves take input */
      }
    }
    .abtn {
      position: absolute;
      pointer-events: auto;
      touch-action: none; /* §8: no browser pan/zoom on the controls */
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.28); /* soft glow */
    }
    .abtn::before,
    .abtn::after {
      content: "";
      position: absolute;
      inset: 0;
    }
    /* Fill layer (chamfered octagon) — transparent until pressed. */
    .abtn::before {
      background: transparent;
      clip-path: polygon(
        10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
        calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    /* 1.5px white-ish outline: evenodd ring between the outer octagon and
       the same octagon inset by 1.5px (chamfer endpoints at 10.6px so the
       45° edge keeps the stroke width). The first point of each loop is
       repeated so the bridge segment is traversed twice and vanishes. */
    .abtn::after {
      background: rgba(255, 255, 255, 0.65);
      clip-path: polygon(evenodd,
        10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
        calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px,
        10px 0,
        10.6px 1.5px, calc(100% - 10.6px) 1.5px,
        calc(100% - 1.5px) 10.6px, calc(100% - 1.5px) calc(100% - 10.6px),
        calc(100% - 10.6px) calc(100% - 1.5px), 10.6px calc(100% - 1.5px),
        1.5px calc(100% - 10.6px), 1.5px 10.6px,
        10.6px 1.5px);
    }
    /* §8 pressed state: filled + full-bright border + stronger glow. */
    .abtn.pressed { box-shadow: 0 0 16px rgba(255, 255, 255, 0.6); }
    .abtn.pressed::before { background: rgba(255, 255, 255, 0.25); }
    .abtn.pressed::after { background: #fff; }
    .abtn canvas { pointer-events: none; } /* taps always target the button */

    /* §8: ≥64px touch targets, offset by the safe-area insets. */
    #btn-left, #btn-right { width: 92px; height: 72px; }
    #btn-left {
      left: calc(14px + env(safe-area-inset-left, 0px));
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }
    #btn-right {
      left: calc(118px + env(safe-area-inset-left, 0px));
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }
    #btn-thrust {
      width: 200px;
      height: 72px;
      right: calc(14px + env(safe-area-inset-right, 0px));
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }
    #btn-obs {
      width: 84px;
      height: 48px;
      right: calc(14px + env(safe-area-inset-right, 0px));
      top: calc(14px + env(safe-area-inset-top, 0px));
    }
    /* Label canvases are drawn at 2x logical size and downscaled by CSS so
       the stroke-font beam stays crisp on high-DPI screens. */
    #btn-left canvas, #btn-right canvas { width: 36px; height: 36px; }
    #btn-thrust canvas { width: 120px; height: 32px; }
    #btn-obs canvas { width: 55px; height: 22px; }

    /* §8: portrait phones get a rotate hint above the (very short) canvas. */
    #rotate-hint { display: none; }
    @media (pointer: coarse) and (orientation: portrait) {
      #rotate-hint {
        display: block;
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.25em;
        padding: 0.4rem 0;
        text-shadow: 0 0 6px rgba(255, 255, 255, 0.7);
      }
    }

    /* ------------------------------------------------------------ footer */
    footer {
      color: #777;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.6rem 0;
      user-select: none;
    }
    footer a {
      color: #999;
      text-decoration: none;
      border-bottom: 1px dotted #666;
    }
  </style>
</head>
<body>
  <header>
    <!-- §8/§9: title + tagline drawn once at load with the stroke font and
         the game's actual lander polylines (see the inline script below). -->
    <canvas id="header" width="1600" height="170"
            role="img" aria-label="LUNAR LANDER — a classic 1979 arcade, rebuilt as a reinforcement-learning arena"></canvas>
  </header>
  <div id="rotate-hint">ROTATE YOUR DEVICE</div>

  <div id="stage">
    <canvas id="screen" width="2000" height="750"></canvas>
  </div>

  <!-- Touch arcade buttons (§8): ←/→ rotate pair bottom-left, wide THRUST
       bottom-right, small OBS toggle top-right. Pointer events feed the same
       held-input set as the keyboard; the empty canvases get their labels
       drawn once with VectorFont at boot. Wired in app.js only on
       coarse-pointer devices (CSS hides them everywhere else). -->
  <div id="touch" aria-hidden="true">
    <div class="abtn" id="btn-left" data-code="BtnLeft">
      <canvas id="label-left" width="72" height="72"></canvas>
    </div>
    <div class="abtn" id="btn-right" data-code="BtnRight">
      <canvas id="label-right" width="72" height="72"></canvas>
    </div>
    <div class="abtn" id="btn-thrust" data-code="BtnThrust">
      <canvas id="label-thrust" width="240" height="64"></canvas>
    </div>
    <div class="abtn" id="btn-obs" data-code="BtnObs">
      <canvas id="label-obs" width="110" height="44"></canvas>
    </div>
  </div>

  <footer>
    &larr;/A &rarr;/D rotate &nbsp;&middot;&nbsp; &uarr;/W/space thrust &nbsp;&middot;&nbsp; 1/2/3 difficulty &nbsp;&middot;&nbsp; R new episode &nbsp;&middot;&nbsp; O agent view
    &nbsp;&middot;&nbsp; <a href="docs.html">DOCS</a>
    &nbsp;&middot;&nbsp; <a href="https://github.com/bijanmehr/MultiLander">GITHUB</a>
    &nbsp;&middot;&nbsp; <span style="color:#666">by <a href="https://github.com/bijanmehr">bijan mehr</a></span>
  </footer>

  <!-- Pyodide runtime (CONTRACT §8) -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <!-- Plain scripts, no modules: the stroke font (§9, no game logic), then
       effects (cosmetic layer, §10), then renderer (uses VectorFont for all
       text and Effects for blink/camera data), then app. -->
  <script src="vectorfont.js"></script>
  <script src="effects.js"></script>
  <script src="renderer.js"></script>
  <script src="app.js"></script>

  <script>
    // Header canvas (§8): LUNAR LANDER in the stroke font with the game's
    // actual lander polylines (§9 body shape, y-up) as the glyph beside it,
    // tagline beneath — the same beam-and-glow look as the tube. Painted
    // exactly once; nothing here animates.
    (() => {
      const canvas = document.getElementById("header");
      const ctx = canvas.getContext("2d");
      const TITLE = "LUNAR LANDER";
      const TAGLINE =
        "A CLASSIC 1979 ARCADE — REBUILT AS A REINFORCEMENT-LEARNING ARENA";

      // The §9 lander polylines, exactly as renderer.js draws them.
      const LANDER = [
        [[-6, 2], [-6, 9], [-3, 13], [3, 13], [6, 9], [6, 2], [-6, 2]], // cabin
        [[-8, 2], [8, 2]],                                             // base
        [[-4, 2], [-2, -3], [2, -3], [4, 2]],                          // nozzle
        [[-6, 2], [-12, -10]],                                         // left leg
        [[6, 2], [12, -10]],                                           // right leg
        [[-15, -10], [-9, -10]],                                       // left foot
        [[9, -10], [15, -10]],                                         // right foot
      ];

      ctx.strokeStyle = "#fff";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 6; // §9 glow

      // Layout: [lander glyph] + gap + [title], centered as one group.
      const size = 80;                  // title cap height
      const titleW = VectorFont.measure(TITLE, size);
      const s = 3.2;                    // lander scale: 30 units -> 96px wide
      const glyphW = 30 * s;
      const gap = 34;
      const x0 = (canvas.width - (glyphW + gap + titleW)) / 2;
      const base = 100;                 // title baseline (caps span y 20..100)

      // Lander, centered on the title caps. Body frame is y-up (§1).
      ctx.save();
      ctx.translate(x0 + glyphW / 2, base - size / 2 + 1.5 * s);
      ctx.scale(s, -s);
      ctx.lineWidth = 1.6 / s;
      for (const poly of LANDER) {
        ctx.beginPath();
        ctx.moveTo(poly[0][0], poly[0][1]);
        for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
        ctx.stroke();
      }
      ctx.restore();

      VectorFont.draw(ctx, TITLE, x0 + glyphW + gap, base, size);

      // Tagline: dimmer beam, softer glow.
      ctx.strokeStyle = "#999";
      ctx.shadowBlur = 3;
      VectorFont.draw(ctx, TAGLINE, canvas.width / 2, 152, 18,
                      { align: "center" });
    })();
  </script>
</body>
</html>
